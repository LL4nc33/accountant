<div cds-layout="horizontal gap:md align:left">
  <h1>Passwort ändern</h1>
</div>

<main>
  <clr-alert *ngIf="forcedFromDefault" clrAlertType="warning" [clrAlertClosable]="false">
    <clr-alert-item>
      <span class="alert-text">
        Du verwendest noch das Default-Passwort. Bitte jetzt ein eigenes setzen,
        bevor du weitermachst.
      </span>
    </clr-alert-item>
  </clr-alert>

  <form clrForm clrLayout="horizontal" (ngSubmit)="submit()" class="pw-form">
    <clr-password-container *ngIf="!forcedFromDefault">
      <label>Aktuelles Passwort</label>
      <input clrPassword name="currentPassword" autocomplete="current-password"
             [(ngModel)]="currentPassword" required />
    </clr-password-container>

    <clr-password-container>
      <label>Neues Passwort</label>
      <input clrPassword name="newPassword" autocomplete="new-password"
             [(ngModel)]="newPassword" required minlength="8" />
      <clr-control-helper>Mindestens 8 Zeichen.</clr-control-helper>
    </clr-password-container>

    <clr-password-container>
      <label>Neues Passwort wiederholen</label>
      <input clrPassword name="confirmPassword" autocomplete="new-password"
             [(ngModel)]="confirmPassword" required />
    </clr-password-container>

    <p class="error" *ngIf="error">{{ error }}</p>

    <div class="actions">
      <button class="btn btn-primary" type="submit" [disabled]="saving">
        {{ saving ? 'Speichert…' : 'Passwort setzen' }}
      </button>
    </div>
  </form>
</main>
