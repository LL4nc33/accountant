<p *ngIf="loading" class="m-muted">Lädt …</p>

<form *ngIf="!loading" class="m-form" (ngSubmit)="save()">

  <m-form-section title="Beleg">
    <label class="m-field">
      <span>Beleg-Datum *</span>
      <input type="date" name="dateStr" [(ngModel)]="dateStr" required />
    </label>

    <label class="m-field">
      <span>Lieferant *</span>
      <input type="text" name="vendor" [(ngModel)]="entity.vendor" required placeholder="Name des Rechnungsausstellers" />
    </label>

    <label class="m-field">
      <span>Belegnummer</span>
      <input type="text" name="reference" [(ngModel)]="entity.reference" placeholder="Optional — wie auf dem Beleg" />
    </label>

    <label class="m-field">
      <span>Kategorie</span>
      <select name="category" [(ngModel)]="entity.category">
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>
    </label>

    <label class="m-field">
      <span>Beschreibung</span>
      <textarea name="description" [(ngModel)]="entity.description" rows="3"></textarea>
    </label>
  </m-form-section>

  <m-form-section title="Beträge" subtitle="Netto und Brutto sind direkt gekoppelt.">
    <label class="m-field">
      <span>Netto (€)</span>
      <input type="number" step="0.01" name="netTotal" [(ngModel)]="entity.netTotal" (ngModelChange)="recalcGross()" inputmode="decimal" />
    </label>

    <label class="m-field">
      <span>USt-Satz (%)</span>
      <input type="number" step="0.5" name="vatRate" [(ngModel)]="entity.vatRate" (ngModelChange)="recalcGross()" inputmode="decimal" />
    </label>

    <label class="m-field">
      <span>Brutto (€)</span>
      <input type="number" step="0.01" name="grossTotal" [(ngModel)]="entity.grossTotal" (ngModelChange)="recalcNet()" inputmode="decimal" />
    </label>
  </m-form-section>

  <m-form-section title="Zahlung">
    <label class="m-field">
      <span>Zahlungsstatus</span>
      <select name="paymentStatus" [(ngModel)]="entity.paymentStatus">
        <option *ngFor="let s of paymentStatuses" [value]="s">{{ s }}</option>
      </select>
    </label>

    <label class="m-field" *ngIf="entity.paymentStatus === 'bezahlt'">
      <span>Bezahlt am</span>
      <input type="date" name="paidAtStr" [(ngModel)]="paidAtStr" />
    </label>
  </m-form-section>

  <div class="m-form-actions">
    <button type="button" class="m-pill" (click)="cancel()">Abbrechen</button>
    <button type="submit" class="m-pill m-pill-primary" [disabled]="saving">{{ saving ? 'Speichert…' : 'Speichern' }}</button>
  </div>

</form>
