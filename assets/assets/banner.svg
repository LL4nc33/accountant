<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="accountant. Open-source Buchhaltung &amp; Rechnungen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d1d1f"/>
      <stop offset="1" stop-color="#101012"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#cfcfca"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <!-- subtle ruled paper lines -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
  </g>

  <!-- mark: a folded accountant / open ledger -->
  <g transform="translate(96,96)">
    <rect x="0" y="0" width="128" height="128" rx="18" fill="url(#mark)"/>
    <g stroke="#1d1d1f" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M64 28 V100"/>
      <path d="M30 40 C 44 32, 56 34, 64 42"/>
      <path d="M98 40 C 84 32, 72 34, 64 42"/>
      <path d="M30 40 V92 C 44 84, 56 86, 64 94"/>
      <path d="M98 40 V92 C 84 84, 72 86, 64 94"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="268" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="600" fill="#f7f7f5" letter-spacing="-1">accountant</text>
  <text x="270" y="210" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="29" fill="#a9a9a4">Open-source Buchhaltung &amp; Rechnungen mit lokalem KI-Assistent</text>
  <text x="270" y="250" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#6f6f6a">Österreich · EPU / Kleinunternehmer · §11 UStG · UVA · self-hosted</text>

  <!-- accent -->
  <rect x="268" y="176" width="64" height="4" rx="2" fill="#f7f7f5"/>
</svg>
